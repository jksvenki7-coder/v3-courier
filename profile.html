<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | V3 Group of Business</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo">
<h2>V3 Group of Business</h2>
<p>Courier & Ride Booking</p>
</div>

<nav>

<a href="index.html">Home</a>
<a href="booking.html">Book</a>
<a href="tracking.html">Tracking</a>
<a href="my-orders.html">Orders</a>

</nav>

</header>

<section class="booking">

<h2>My Profile</h2>

<div class="profile-card">

<img src="images/user.png"
id="profileImage"
width="120"
height="120"
style="border-radius:50%;">

<br><br>

<input
type="file"
id="imageUpload">

<br><br>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
readonly>

<textarea
id="address"
placeholder="Address"></textarea>

<input
type="text"
id="city"
placeholder="City">

<input
type="text"
id="state"
placeholder="State">

<input
type="text"
id="pincode"
placeholder="Pincode">

<button id="saveProfile">

Save Profile

</button>

<br><br>

<button id="logout">

Logout

</button>

</div>

</section>

<section class="features">

<h2>Quick Menu</h2>

<div class="cards">

<div class="card">

<i class="fa-solid fa-box"></i>

<h3>My Orders</h3>

<a href="my-orders.html">

Open

</a>

</div>

<div class="card">

<i class="fa-solid fa-location-dot"></i>

<h3>Track Order</h3>

<a href="tracking.html">

Track

</a>

</div>

<div class="card">

<i class="fa-solid fa-wallet"></i>

<h3>Wallet</h3>

₹0

</div>

<div class="card">

<i class="fa-solid fa-gift"></i>

<h3>Coupons</h3>

5 Available

</div>

</div>

</section>

<footer>

<h3>V3 Group of Business</h3>

<p>All in One App</p>

</footer>

<script type="module"
src="js/profile.js">

</script>

</body>

</html>
